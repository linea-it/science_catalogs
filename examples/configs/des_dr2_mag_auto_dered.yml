# Run example:
# science-catalogs examples/configs/des_dr2_mag_auto_dered.yml examples/output/des_dr2_mag_auto_dered

input:
  catalog_folder: tests/data
  catalog_pattern: "des_dr2_sample_1000.fits"
  which_release: DES_DR2
  user_selected_cols:
    - COADD_OBJECT_ID
    - TILENAME
    - RA
    - DEC
    - MAG_AUTO_G_DERED
    - MAG_AUTO_R_DERED
    - MAG_AUTO_I_DERED
    - MAG_AUTO_Z_DERED
    - MAG_AUTO_Y_DERED
    - MAGERR_AUTO_G
    - MAGERR_AUTO_R
    - MAGERR_AUTO_I
    - MAGERR_AUTO_Z
    - MAGERR_AUTO_Y
    - EXTENDED_CLASS_COADD
    - FLAGS_I
  is_id_in_index: false
  input_col_type: mag_dered
  input_col_model: auto
  compute_magnitude: false
  compute_dereddening: false
  keep_input_columns_after_filters_or_transformations: false
  col_pattern: MAG_AUTO_BAND_DERED
  err_pattern: MAGERR_AUTO_BAND
  selected_bands: [G, R, I, Z, Y]
  ra_col: RA
  dec_col: DEC
  band_case: lower_case
  filter:
    enabled: false
    column: null
    value: null
    drop_column_after_filter: false
  initial_cut:
    enabled: false
    column: null
    column_type: mag
    mag_value: null
    flux_value: null

output:
  save_as: parquet
  base_path: examples/output/des_dr2_mag_auto_dered
  target_rows_per_part: 1000000
  order_by: COADD_OBJECT_ID
  col_final_pattern: mag_BAND
  err_final_pattern: magerr_BAND
  band_case: lower_case
  mag_offset: 30.0
  A_EBV:
    G: 3.186
    R: 2.140
    I: 1.569
    Z: 1.196
    Y: 1.048
  col_for_filename: TILENAME

invalid_handling:
  replace_invalid_values: true
  how_to_replace_col_values: all
  how_to_replace_err_values: only_with_invalid_col
  cross_invalidate: false
  col_value_to_replace: 99.0
  err_value_to_replace: 99.0
  is_nan_and_inf_invalid_for_col: true
  is_nan_and_inf_invalid_for_err: true
  set_limit_for_col: true
  limit_value_for_col: 99.0
  limit_comparison_for_col: greater_or_equal
  use_absolute_for_col_limits: true
  set_limit_for_err: true
  limit_value_for_err: 99.0
  limit_comparison_for_err: greater_or_equal
  use_absolute_for_err_limits: true
  round_col: false
  round_col_decimal_cases: 5
  round_err: false
  round_err_decimal_cases: 5

cluster:
  executor: local
  local:
    n_workers: 3
    threads_per_worker: 2
    memory_limit: "4GB"
  # To run with a SLURM cluster, switch executor to slurm and uncomment:
  # executor: slurm
  # slurm:
  #   interface: ib0
  #   queue: cpu
  #   cores: 2
  #   processes: 1
  #   memory: 48GB
  #   walltime: "01:00:00"
  #   job_extra_directives:
  #     - "--account=<account>"
  #   dask_scale_number: 15

dust:
  path_to_dustmaps: null
  use_dustmap: sfd
  distance_col_pc: null
  distance_fixed_pc: null

collection:
  margin_threshold: 10.0
