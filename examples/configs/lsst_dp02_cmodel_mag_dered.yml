# Run example:
# science-catalogs examples/configs/lsst_dp02_cmodel_mag_dered.yml examples/output/lsst_dp02_cmodel_mag_dered

input:
  catalog_folder: tests/data
  catalog_pattern: "lsst_dp02_scrambled_sample_1000.parq"
  which_release: LSST_DP02
  user_selected_cols:
    - coord_ra
    - coord_dec
    - u_cModelFlux
    - g_cModelFlux
    - r_cModelFlux
    - i_cModelFlux
    - z_cModelFlux
    - y_cModelFlux
    - u_cModelFluxErr
    - g_cModelFluxErr
    - r_cModelFluxErr
    - i_cModelFluxErr
    - z_cModelFluxErr
    - y_cModelFluxErr
    - detect_isPrimary
    - refExtendedness
    - tract
    - patch
  is_id_in_index: true
  input_col_type: flux
  input_col_model: cModelFlux
  compute_magnitude: true
  compute_dereddening: true
  keep_input_columns_after_filters_or_transformations: false
  col_pattern: BAND_cModelFlux
  err_pattern: BAND_cModelFluxErr
  selected_bands: [u, g, r, i, z, y]
  ra_col: coord_ra
  dec_col: coord_dec
  band_case: lower_case
  use_dustmap: sfd
  filter:
    enabled: true
    column: detect_isPrimary
    value: true
    drop_column_after_filter: true
  initial_cut:
    enabled: false
    column: null
    column_type: flux
    mag_value: null
    flux_value: null

output:
  save_as: parquet
  base_path: examples/output/lsst_dp02_cmodel_mag_dered
  target_rows_per_part: 1000000
  order_by: tract
  col_final_pattern: mag_dered_BAND
  err_final_pattern: magerr_dered_BAND
  band_case: lower_case
  mag_offset: 31.4
  A_EBV:
    u: 4.81
    g: 3.64
    r: 2.70
    i: 2.06
    z: 1.58
    y: 1.31
  col_for_filename: tract

invalid_handling:
  replace_invalid_values: true
  how_to_replace_col_values: all
  how_to_replace_err_values: only_with_invalid_col
  cross_invalidate: false
  col_value_to_replace: 99.0
  err_value_to_replace: 99.0
  is_nan_and_inf_invalid_for_col: true
  is_nan_and_inf_invalid_for_err: true
  set_limit_for_col: true
  limit_value_for_col: 99.0
  limit_comparison_for_col: greater_or_equal
  use_absolute_for_col_limits: true
  set_limit_for_err: true
  limit_value_for_err: 99.0
  limit_comparison_for_err: greater_or_equal
  use_absolute_for_err_limits: true
  round_col: false
  round_col_decimal_cases: 5
  round_err: false
  round_err_decimal_cases: 5

cluster:
  executor: local
  local:
    n_workers: 3
    threads_per_worker: 2
    memory_limit: "4GB"
  # To run with a SLURM cluster, switch executor to slurm and uncomment:
  # executor: slurm
  # slurm:
  #   interface: ib0
  #   queue: cpu
  #   cores: 2
  #   processes: 1
  #   memory: 48GB
  #   walltime: "01:00:00"
  #   job_extra_directives:
  #     - "--account=<account>"
  #   dask_scale_number: 15

dust:
  path_to_dustmaps: null
  use_dustmap: sfd
  distance_col_pc: null
  distance_fixed_pc: null

collection:
  margin_threshold: 10.0
